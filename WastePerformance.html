<!doctype html>
<html lang="th">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Waste Performance Analytics</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root{
            --bg:#f6f8f9;
            --card:#ffffff;
            --accent:#0a6847;
            --muted:#6b7280;
        }
        body{
            margin:0;
            font-family: "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
            background:var(--bg);
            color:#111827;
        }
        .container{
            max-width:1200px;
            margin:20px auto;
            padding:18px;
        }
        header{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
            margin-bottom:16px;
        }
        header h1{
            margin:0;
            font-size:20px;
            color:var(--accent);
        }
        .controls{
            display:flex;
            flex-wrap: wrap; 
            gap:8px;
            align-items:center;
        }
        .controls select, .controls input[type="date"], .controls input[type="number"] {
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }
        .filter-inputs {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #loadingIndicator {
            color: var(--accent);
            font-weight: 600;
            margin-left: 10px;
            display: none;
        }
        .btn{
            background:var(--accent);
            color:white;
            border:none;
            padding:8px 10px;
            border-radius:8px;
            cursor:pointer;
            font-weight:600;
        }
        .kpi{
            display:grid;
            grid-template-columns:repeat(5,1fr);
            gap:12px;
            margin-bottom:18px;
        }
        .card{
            background:var(--card);
            border-radius:10px;
            padding:12px;
            box-shadow:0 6px 18px rgba(10,10,10,0.04);
        }
        .card .title{font-size:13px;color:var(--muted);margin-bottom:6px;}
        .card .value{font-size:20px;font-weight:700;color:#111827;}
        .up { color: #dc2626; font-weight: 600; } 
        .down { color: #15803d; font-weight: 600; } 
        .same { color: var(--muted); }

        .grid-two{
            display:grid;
            grid-template-columns: 1fr 420px;
            gap:16px;
            margin-bottom:16px;
        }
        .chart-wrap{background:var(--card);padding:12px;border-radius:10px;box-shadow:0 6px 18px rgba(10,10,10,0.04);}
        canvas{width:100% !important;height:320px !important;}
        table{
            width:100%;
            border-collapse:collapse;
            font-size:13px;
        }
        thead th{
            text-align:left;
            padding:8px;
            background:#f3f4f6;
            border-bottom:1px solid #e5e7eb;
        }
        tbody td{
            padding:8px;
            border-bottom:1px solid #eee;
        }
        .table-container{
            background:var(--card);
            border-radius:10px;
            padding:8px;
            box-shadow:0 6px 18px rgba(10,10,10,0.04);
            overflow:auto;
            max-height:420px;
        }
        .tools{
            display:flex;
            gap:8px;
            margin-bottom:8px;
            align-items:center;
        }
        .search{
            padding:8px 10px;
            border-radius:8px;
            border:1px solid #ddd;
            min-width:220px;
        }
        @media(max-width:980px){
            .kpi{grid-template-columns:repeat(2,1fr);}
            .grid-two{grid-template-columns:1fr;}
            canvas{height:260px !important;}
            .controls {
                flex-direction: column;
                align-items: flex-start;
            }
            .filter-inputs {
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Waste Performance Analytics</h1>
            <div class="controls">
                <select id="filterType">
                    <option value="day">กรองรายวัน</option>
                    <option value="month">กรองรายเดือน</option>
                    <option value="year">กรองรายปี</option>
                </select>
                
                <div id="dayControls" class="filter-inputs">
                    <label for="filterDay">วันที่:</label>
                    <input type="date" id="filterDay" />
                </div>
                
                <div id="monthControls" class="filter-inputs" style="display:none;">
                    <label for="filterMonth">เดือน:</label>
                    <input type="number" id="filterMonth" min="1" max="12" style="width: 50px;">
                    <label for="filterYearM">ปี:</label>
                    <input type="number" id="filterYearM" min="2020" style="width: 70px;">
                </div>

                <div id="yearControls" class="filter-inputs" style="display:none;">
                    <label for="filterYearY">ปี:</label>
                    <input type="number" id="filterYearY" min="2020" style="width: 70px;">
                </div>
                
                <button class="btn" id="applyFilterBtn">กรองข้อมูล</button>
                <button class="btn" id="resetBtn">รีเซ็ต</button>
                <button class="btn" id="exportBtn">Export CSV</button>
                <button class="btn" onclick="goBack()">กลับหน้าหลัก</button>
                <span id="loadingIndicator">กำลังโหลด...</span>
            </div>
        </header>

        <section class="kpi" aria-label="KPI summary">
            <div class="card">
                <div class="title">ถุงแดงรวม</div>
                <div class="value" id="totalRed">0</div>
                <div class="compare" id="compareRed" style="color:var(--muted);font-size:12px; margin-top:4px;"></div>
            </div>
            <div class="card">
                <div class="title">ถุงเขียวรวม</div>
                <div class="value" id="totalGreen">0</div>
                <div class="compare" id="compareGreen" style="color:var(--muted);font-size:12px; margin-top:4px;"></div>
            </div>
            <div class="card">
                <div class="title">ถุงดำรวม</div>
                <div class="value" id="totalBlack">0</div>
                <div class="compare" id="compareBlack" style="color:var(--muted);font-size:12px; margin-top:4px;"></div>
            </div>
            <div class="card">
                <div class="title">ถุงใส่เศษอาหารรวม</div>
                <div class="value" id="totalFood">0</div>
                <div class="compare" id="compareFood" style="color:var(--muted);font-size:12px; margin-top:4px;"></div>
            </div>
            <div class="card">
                <div class="title">จำนวนจุดที่บันทึก</div>
                <div class="value" id="totalLocations">0</div>
                <div class="compare" id="compareLocations" style="color:var(--muted);font-size:12px; margin-top:4px;"></div>
            </div>
        </section>

        <section class="grid-two">
            <div class="chart-wrap">
                <canvas id="barChart"></canvas>
            </div>

            <div style="display:flex;flex-direction:column;gap:12px;">
                <div class="chart-wrap">
                    <canvas id="pieChart"></canvas>
                </div>
                <div class="card">
                    <h3 style="margin:0 0 10px 0; font-size:14px;">📊 รายละเอียดสรุป (เทียบช่วงก่อนหน้า)</h3>
                    <div id="bagSummary" style="font-size:13px; color:var(--text-muted);">
                        -
                    </div>
                </div>
            </div>
        </section>

        <div class="table-container" style="margin-top:12px;">
            <div class="tools" style="justify-content:space-between;">
                <div style="display:flex;gap:8px;align-items:center;">
                    <input class="search" id="searchInput" placeholder="ค้นหาชื่อพื้นที่..." />
                    <select id="bagFilter" style="padding:8px;border-radius:8px;border:1px solid #ddd;">
                        <option value="">-- แสดงทุกประเภทถุง --</option>
                        <option value="red">ถุงแดง > 0</option>
                        <option value="green">ถุงเขียว > 0</option>
                        <option value="black">ถุงดำ > 0</option>
                        <option value="food">ถุงอาหาร > 0</option>
                    </select>
                </div>
                <div style="color:var(--muted);font-size:13px;">แสดงข้อมูลที่กรองแล้ว: <span id="rowsCount">0</span> แถว</div>
            </div>

            <table id="dataTable">
                <thead>
                    <tr>
                        <th>หมายเลข</th>
                        <th>พื้นที่</th>
                        <th>ถุงแดง</th>
                        <th>ถุงเขียว</th>
                        <th>ถุงดำ</th>
                        <th>ถุงอาหาร</th>
                        <th>วันที่</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzoDaY-EPmqPUlNf_TQEeOZ7IqbEgfsUZ6-8ViMOAXZXVsm5AhRvWUgb2hV8XzT7yozxQ/exec';
        
        let currentData = []; 
        let filteredData = []; 
        let previousData = []; 

        function formatNumber(n) { return Number(n).toLocaleString('en-US'); }

        const LOCATION_PER_DAY = 36; // จำนวนจุดเก็บขยะ 100% มีกี่จุด

        function getDaysInMonth(year, month) { return new Date(year, month, 0).getDate(); }
        function getDaysInYear(year) { return ((year % 4 === 0 && year % 100 !== 0) || year % 400 === 0) ? 366 : 365; }

        function getMaxLocations(filterType, params) {
            if (filterType === 'day') return LOCATION_PER_DAY;
            if (filterType === 'month') return LOCATION_PER_DAY * getDaysInMonth(Number(params.year), Number(params.month));
            if (filterType === 'year') return LOCATION_PER_DAY * getDaysInYear(Number(params.year));
            return LOCATION_PER_DAY;
        }

        // ====== ฟังก์ชันใหม่สำหรับคำนวณ % การเพิ่มลดในสรุป ======
        function getTrendHtml(current, previous) {
            if (previous === 0) return current > 0 ? `<span class="up">▲ New</span>` : `<span class="same">-</span>`;
            const diffPercent = Math.round(((current - previous) / previous) * 100);
            if (diffPercent === 0) return `<span class="same">0%</span>`;
            const arrow = diffPercent > 0 ? '▲' : '▼';
            const className = diffPercent > 0 ? 'up' : 'down';
            return `<span class="${className}">${arrow} ${Math.abs(diffPercent)}%</span>`;
        }

        function renderBagSummary(totals, prevTotals) {
            const totalAll = totals.red + totals.green + totals.black + totals.food;
            const prevTotalAll = prevTotals.red + prevTotals.green + prevTotals.black + prevTotals.food;
            const percent = (value) => totalAll === 0 ? 0 : Math.round((value / totalAll) * 100);
            
            const html = `
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <div>🟥 ถุงแดง: ${formatNumber(totals.red)} (${percent(totals.red)}%) ${getTrendHtml(totals.red, prevTotals.red)}</div>
                    <div>⬛ ถุงดำ: ${formatNumber(totals.black)} (${percent(totals.black)}%) ${getTrendHtml(totals.black, prevTotals.black)}</div>
                    <div>🟩 ถุงเขียว: ${formatNumber(totals.green)} (${percent(totals.green)}%) ${getTrendHtml(totals.green, prevTotals.green)}</div>
                    <div>🟨 ถุงอาหาร: ${formatNumber(totals.food)} (${percent(totals.food)}%) ${getTrendHtml(totals.food, prevTotals.food)}</div>
                </div>
                <div style="margin-top:12px; padding-top:10px; border-top:1px solid #eee; font-weight:700;">
                    รวมทั้งหมด: ${formatNumber(totalAll)} ใบ ${getTrendHtml(totalAll, prevTotalAll)}
                </div>`;
            document.getElementById('bagSummary').innerHTML = html;
        }

        /**
         * ปรับปรุง: หักวันอาทิตย์ออกจากการเปรียบเทียบ
         */
        function getPreviousPeriodParams(filterType, currentParams) {
            if (filterType === 'day' && currentParams.day) {
                let [y, m, d] = currentParams.day.split('-').map(Number);
                let date = new Date(y, m - 1, d);
                
                // ย้อนไป 1 วัน
                date.setDate(date.getDate() - 1);
                
                // ถ้าเป็นวันอาทิตย์ (0) ให้ย้อนไปอีกเป็นวันเสาร์
                if (date.getDay() === 0) {
                    date.setDate(date.getDate() - 1);
                }
                
                let py = date.getFullYear();
                let pm = String(date.getMonth() + 1).padStart(2, '0');
                let pd = String(date.getDate()).padStart(2, '0');
                return { day: `${py}-${pm}-${pd}` };
            } 
            else if (filterType === 'month' && currentParams.month && currentParams.year) {
                let month = parseInt(currentParams.month);
                let year = parseInt(currentParams.year);
                month -= 1;
                if (month === 0) { month = 12; year -= 1; }
                return { month: month.toString(), year: year.toString() };
            } 
            else if (filterType === 'year' && currentParams.year) {
                let year = parseInt(currentParams.year);
                year -= 1;
                return { year: year.toString() };
            }
            return null;
        }

        async function fetchSinglePeriod(filterType, params) {
            const urlParams = new URLSearchParams();
            if (filterType && params) {
                urlParams.append('type', filterType);
                if (filterType === 'day' && params.day) {
                    const [year, month, day] = params.day.split('-');
                    urlParams.append('date', `${day}/${month}/${year}`);
                } else if (filterType === 'month' && params.month && params.year) {
                    urlParams.append('month', params.month);
                    urlParams.append('year', params.year);
                } else if (filterType === 'year' && params.year) {
                    urlParams.append('year', params.year);
                }
            } else { return []; }

            const url = `${API_URL}?${urlParams.toString()}`;
            try {
                const response = await fetch(url);
                const result = await response.json();
                if (result.status === 'success') {
                    return result.data.map(row => ({
                        id: row[0], area: row[1], red: Number(row[2] || 0), green: Number(row[3] || 0),
                        black: Number(row[4] || 0), food: Number(row[5] || 0),
                        datetime: row[6]
                          ? new Date(row[6]).toLocaleString('th-TH', {
                                year: 'numeric',
                                month: '2-digit',
                                day: '2-digit',
                                hour: '2-digit',
                                minute: '2-digit'
                            })
                          : ''
                    }));
                }
                return [];
            } catch (error) { return []; }
        }

        async function fetchData(filterType, params) {
            document.getElementById('loadingIndicator').style.display = 'inline';
            const prevParams = getPreviousPeriodParams(filterType, params);
            const [currentPeriodData, previousPeriodData] = await Promise.all([
                fetchSinglePeriod(filterType, params),
                prevParams ? fetchSinglePeriod(filterType, prevParams) : Promise.resolve([])
            ]);
            currentData = currentPeriodData;
            previousData = previousPeriodData;
            document.getElementById('loadingIndicator').style.display = 'none';
        }

        function renderComparison(elementId, current, previous, filterType, isLocationCount = false, maxValue = null) {
            const diff = current - previous;
            const diffElement = document.getElementById(elementId);
            let timeLabel = filterType === 'day' ? 'เมื่อวาน' : (filterType === 'month' ? 'เดือนที่แล้ว' : 'ปีก่อน');

            if (diff === 0) {
                diffElement.innerHTML = `<span class="same">เท่าเดิม</span> เทียบกับ ${timeLabel}`;
                return;
            }

            let arrow = diff > 0 ? '▲' : '▼';
            let sign = diff > 0 ? '+' : '';
            let className = isLocationCount ? (diff > 0 ? 'down' : 'up') : (diff > 0 ? 'up' : 'down');
            
            const diffPercent = maxValue ? Math.round((Math.abs(diff) / maxValue) * 100) : (previous > 0 ? Math.round((Math.abs(diff) / previous) * 100) : null);
            const percentText = diffPercent !== null ? ` (${sign}${diffPercent}%)` : '';

            diffElement.innerHTML = `<span class="${className}">${arrow} ${sign}${formatNumber(diff)}${percentText}</span> เทียบกับ ${timeLabel}`;
        }

        function computeAndRender(data, previousData) {
            const totals = data.reduce((acc, row) => {
                acc.red += row.red; acc.green += row.green; acc.black += row.black; acc.food += row.food;
                return acc;
            }, { red: 0, green: 0, black: 0, food: 0, locations: data.length });

            const prevTotals = previousData.reduce((acc, row) => {
                acc.red += row.red; acc.green += row.green; acc.black += row.black; acc.food += row.food;
                return acc;
            }, { red: 0, green: 0, black: 0, food: 0, locations: previousData.length });

            document.getElementById('totalRed').innerText = formatNumber(totals.red);
            document.getElementById('totalGreen').innerText = formatNumber(totals.green);
            document.getElementById('totalBlack').innerText = formatNumber(totals.black);
            document.getElementById('totalFood').innerText = formatNumber(totals.food);
            
            // ส่งค่าไป render สรุปพร้อม % การเพิ่มลด
            renderBagSummary(totals, prevTotals);

            const filterType = document.getElementById('filterType').value;
            const params = {
                day: document.getElementById('filterDay').value,
                month: document.getElementById('filterMonth').value,
                year: (filterType === 'month') ? document.getElementById('filterYearM').value : document.getElementById('filterYearY').value
            };

            const maxLocations = getMaxLocations(filterType, params);
            const locationPercent = maxLocations ? Math.round((totals.locations / maxLocations) * 100) : 0;
            document.getElementById('totalLocations').innerText = `${totals.locations} (${locationPercent}%)`;
            
            renderComparison('compareRed', totals.red, prevTotals.red, filterType, false); 
            renderComparison('compareGreen', totals.green, prevTotals.green, filterType, false);
            renderComparison('compareBlack', totals.black, prevTotals.black, filterType, false);
            renderComparison('compareFood', totals.food, prevTotals.food, filterType, false);
            renderComparison('compareLocations', totals.locations, prevTotals.locations, filterType, true, maxLocations);

            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = '';
            data.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${r.id}</td><td>${r.area}</td><td>${r.red}</td><td>${r.green}</td><td>${r.black}</td><td>${r.food}</td><td>${r.datetime}</td>`;
                tbody.appendChild(tr);
            });
            document.getElementById('rowsCount').innerText = data.length;
            updateCharts(data, totals);
        }

        let pieChart, barChart;
        function createCharts() {
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            pieChart = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: ['ถุงแดง', 'ถุงเขียว', 'ถุงดำ', 'ถุงอาหาร'],
                    datasets: [{ data: [0, 0, 0, 0], backgroundColor: ['#ef4444', '#10b981', '#111827', '#f59e0b'], borderWidth: 1 }]
                },
                options: { plugins: { legend: { position: 'bottom' } }, responsive: true, maintainAspectRatio: false }
            });

            const ctxBar = document.getElementById('barChart').getContext('2d');
            barChart = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'ถุงแดง', data: [], stack: 'stack1', backgroundColor: '#ef4444' },
                        { label: 'ถุงเขียว', data: [], stack: 'stack1', backgroundColor: '#10b981' },
                        { label: 'ถุงดำ', data: [], stack: 'stack1', backgroundColor: '#111827' },
                        { label: 'ถุงอาหาร', data: [], stack: 'stack1', backgroundColor: '#f59e0b' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } } }
            });
        }

        function updateCharts(data, totals) {
            pieChart.data.datasets[0].data = [totals.red, totals.green, totals.black, totals.food];
            pieChart.update();

            const areaCounts = data.reduce((acc, r) => {
                if (!acc[r.area]) acc[r.area] = { red: 0, green: 0, black: 0, food: 0 };
                acc[r.area].red += r.red; acc[r.area].green += r.green; acc[r.area].black += r.black; acc[r.area].food += r.food;
                return acc;
            }, {});

            const labels = Object.keys(areaCounts);
            barChart.data.labels = labels;
            barChart.data.datasets[0].data = labels.map(l => areaCounts[l].red);
            barChart.data.datasets[1].data = labels.map(l => areaCounts[l].green);
            barChart.data.datasets[2].data = labels.map(l => areaCounts[l].black);
            barChart.data.datasets[3].data = labels.map(l => areaCounts[l].food);
            barChart.update();
        }

        function applyClientFilters() {
            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            const bagFilter = document.getElementById('bagFilter').value;
            filteredData = currentData.filter(r => {
                if (search && !r.area.toLowerCase().includes(search)) return false;
                if (bagFilter && !(r[bagFilter] > 0)) return false;
                return true;
            });
            computeAndRender(filteredData, previousData);
        }

        async function handleApplyFilter() {
            const filterType = document.getElementById('filterType').value;
            const params = {
                day: document.getElementById('filterDay').value,
                month: document.getElementById('filterMonth').value,
                year: (filterType === 'month') ? document.getElementById('filterYearM').value : document.getElementById('filterYearY').value
            };
            if ((filterType==='day' && !params.day) || (filterType==='month' && (!params.month || !params.year)) || (filterType==='year' && !params.year)) {
                alert('โปรดเลือกเงื่อนไขการกรองให้ครบถ้วน'); return;
            }
            await fetchData(filterType, params);
            applyClientFilters();
        }

        function switchFilterControls() {
            const type = document.getElementById('filterType').value;
            document.getElementById('dayControls').style.display = type === 'day' ? 'flex' : 'none';
            document.getElementById('monthControls').style.display = type === 'month' ? 'flex' : 'none';
            document.getElementById('yearControls').style.display = type === 'year' ? 'flex' : 'none';
        }

        function exportCSV() {
            const rows = [['หมายเลข', 'พื้นที่', 'ถุงแดง', 'ถุงเขียว', 'ถุงดำ', 'ถุงอาหาร', 'วันที่']];
            filteredData.forEach(r => rows.push([r.id, r.area, r.red, r.green, r.black, r.food, r.datetime]));
            const csvContent = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `waste_export_${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();
        }

        function setInitialFilterValues(now) {
            document.getElementById('filterDay').value = now.toISOString().split('T')[0];
            document.getElementById('filterMonth').value = now.getMonth() + 1;
            document.getElementById('filterYearM').value = now.getFullYear();
            document.getElementById('filterYearY').value = now.getFullYear();
            document.getElementById('filterType').value = 'day';
        }

        window.addEventListener('DOMContentLoaded', () => {
            setInitialFilterValues(new Date());
            createCharts();
            switchFilterControls();
            handleApplyFilter();
            document.getElementById('filterType').addEventListener('change', switchFilterControls);
            document.getElementById('applyFilterBtn').addEventListener('click', handleApplyFilter);
            document.getElementById('searchInput').addEventListener('input', () => {
                clearTimeout(window._searchT);
                window._searchT = setTimeout(applyClientFilters, 200);
            });
            document.getElementById('bagFilter').addEventListener('change', applyClientFilters);
            document.getElementById('exportBtn').addEventListener('click', exportCSV);
            document.getElementById('resetBtn').addEventListener('click', () => {
                setInitialFilterValues(new Date());
                document.getElementById('searchInput').value = '';
                document.getElementById('bagFilter').value = '';
                switchFilterControls();
                handleApplyFilter();
            });
        });

        function goBack() { window.location.href = "https://ssi-building.github.io/WasteCheck/Dashboard.html"; }
    </script>
</body>
</html>
